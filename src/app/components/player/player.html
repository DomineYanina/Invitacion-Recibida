<div *ngIf="!musicaActivada" class="bubble-activation" (click)="activarMusica()">
  <span class="merienda">¡Que empiece la fiesta! 🎵</span>
</div>

<div class="reproductor-container" 
     [class.minimizado]="estaMinimizado" 
     *ngIf="musicaActivada">
  
  <button class="btn-control close" (click)="toggleMinimizar()">×</button>
  
  <iframe 
    [src]="safeUrl" 
    width="100%" 
    height="100%" 
    frameborder="0" 
    allow="autoplay; encrypted-media; picture-in-picture" 
    allowfullscreen>
  </iframe>
</div>

<div class="bubble-restore" 
     *ngIf="musicaActivada && estaMinimizado" 
     (click)="toggleMinimizar()">
  <span class="merienda">🎵</span>
</div>
