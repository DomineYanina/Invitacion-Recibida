<div *ngIf="!musicaActivada" class="welcome-overlay">
  <button class="btn-inicio merienda" (click)="activarMusica()">
    {{ config.musica.botonInicio }}
  </button>
</div>

<div class="reproductor-container" *ngIf="musicaActivada">
  <iframe 
    [src]="safeUrl" 
    width="100%" 
    height="100%" 
    frameborder="0" 
    allow="autoplay; encrypted-media; picture-in-picture" 
    allowfullscreen>
  </iframe>
</div>
